<!doctype html>
<html lang="en" x-data="koderApp()" x-init="init()" :data-bs-theme="theme">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>koder</title>
  <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/vendor/highlight/github-dark.min.css" rel="stylesheet">
  <script defer src="/assets/vendor/marked/marked.umd.js"></script>
  <script defer src="/assets/vendor/dompurify/purify.min.js"></script>
  <script defer src="/assets/vendor/highlight/highlight.min.js"></script>
  <link href="/assets/app.css" rel="stylesheet">
  <script>window.KODER_ASSET_HASH = "__KODER_ASSET_HASH__";</script>
  <script defer src="/assets/app.js"></script>
  <script defer src="/assets/vendor/alpine/cdn.min.js"></script>
</head>
<body class="bg-body text-body">
  <div class="app-shell" :style="appShellStyle()">
    <nav class="topbar navbar bg-body-tertiary px-3">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-terminal-fill text-primary"></i>
        <span class="fw-semibold">koder</span>
        <span class="text-secondary small topbar-workspace text-truncate" :title="state.workdir" x-text="state.workdir || ''"></span>
        <span class="text-secondary small" x-text="sessionTitle(state.session || state.Session || {})"></span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-secondary" x-text="connectionLabel()"></span>
        <button class="btn btn-sm btn-outline-secondary" title="Sessions" @click="openSessionDialog()"><i class="bi bi-collection"></i></button>
        <button class="btn btn-sm btn-outline-secondary" title="Settings" @click="openSettingsDialog()"><i class="bi bi-gear"></i></button>
      </div>
    </nav>

    <main class="transcript p-3" x-ref="transcript" @scroll.passive="updateTranscriptStickiness()">
      <template x-if="error">
        <div class="alert alert-danger" x-text="error"></div>
      </template>
      <template x-for="item in timeline()" :key="item.id || item.ID">
        <section class="transcript-turn mb-4">
          <template x-if="item.kind === 'user'">
            <div class="turn user-turn">
              <template x-if="(item.content?.attachments || []).length > 0">
                <div class="attachment-strip mb-2">
                  <template x-for="attachment in item.content.attachments || []" :key="attachment.id || attachment.ID || attachment.path || attachment.Path">
                    <span class="attachment-chip">
                      <i class="bi" :class="attachmentIcon(attachment)"></i>
                      <span class="text-truncate" x-text="attachmentName(attachment)"></span>
                    </span>
                  </template>
                </div>
              </template>
              <div class="markdown-body user-markdown-body">
                <span class="badge user-source-badge" :class="userMessageSourceClass(item)" x-text="userMessageSourceLabel(item)"></span>
                <span class="user-message-text" x-html="markdownHTML(item.content?.text || '')"></span>
              </div>
            </div>
          </template>
          <template x-if="item.kind === 'assistant'">
            <div class="turn assistant-turn">
              <template x-if="item.content?.reasoning?.text">
                <details class="reasoning mb-2">
                  <summary x-text="thinkingLabel(item.content.reasoning)"></summary>
                  <pre x-text="item.content.reasoning.text"></pre>
                </details>
              </template>
              <div class="markdown-body" x-html="markdownHTML(item.content?.text || '')"></div>
              <template x-for="tool in item.content?.tools || []" :key="tool.tool_call_id">
                <div class="tool mt-3">
                  <div class="small fw-semibold"><i class="bi" :class="toolIcon(tool.tool)"></i> <span x-text="toolTitle(tool)"></span> <span class="badge text-bg-secondary" x-text="toolStatusBadge(tool)"></span></div>
                  <div class="small text-secondary" x-show="toolPreview(tool)" x-text="toolPreview(tool)"></div>
                  <div class="btn-group btn-group-sm mt-2" x-show="toolApprovalPending(tool)">
                    <button type="button" class="btn btn-success" @click="rpc('approve', {tool_call_id: toolCallID(tool)})"><i class="bi bi-check-lg"></i> Approve</button>
                    <button type="button" class="btn btn-outline-danger" @click="rpc('deny', {tool_call_id: toolCallID(tool)})"><i class="bi bi-x-lg"></i> Deny</button>
                  </div>
                  <template x-if="tool.result"><div class="tool-result mt-2" x-html="toolResultHTML(tool)"></div></template>
                  <template x-if="tool.error && toolErrorHTML(tool)"><div class="tool-result mt-2" x-html="toolErrorHTML(tool)"></div></template>
                </div>
              </template>
            </div>
          </template>
          <template x-if="item.kind !== 'user' && item.kind !== 'assistant'">
            <div>
              <template x-if="item.kind === 'notice'">
                <div class="notice" :class="'notice-' + noticeLevel(item.content || {})">
                  <i class="bi" :class="noticeIcon(item.content || {})"></i>
                  <span x-text="noticeText(item.content || {})"></span>
                  <span class="text-secondary" x-show="noticeDetail(item.content || {})" x-text="noticeDetail(item.content || {})"></span>
                </div>
              </template>
              <template x-if="item.kind !== 'notice'">
                <div class="message p-2 bg-body-tertiary">
                  <span class="small text-secondary"><i class="bi bi-info-circle"></i> <span x-text="item.kind"></span></span>
                </div>
              </template>
            </div>
          </template>
        </section>
      </template>
      <template x-if="pendingText()">
        <section class="turn assistant-turn mb-4">
          <div class="small text-secondary mb-2"><i class="bi bi-broadcast"></i> streaming</div>
          <div class="markdown-body" x-html="markdownHTML(pendingText())"></div>
        </section>
      </template>
    </main>

    <div class="sidebar-resizer" :class="{'resizing': resizingSidebar}" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" @pointerdown="startSidebarResize($event)"></div>

    <aside class="sidebar p-3 bg-body-tertiary">
      <div class="sidebar-section">
        <div class="sidebar-info-row">
          <span class="sidebar-label">Model</span>
          <button type="button" class="btn btn-link model-trigger p-0 text-start text-truncate" :title="activeModelTooltip()" @click="openModelDialog()">
            <i class="bi bi-cpu me-1 text-secondary"></i><span x-text="activeProvider()"></span> / <span x-text="activeModel()"></span>
          </button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-info-row">
          <span class="sidebar-label">Permissions</span>
          <span class="sidebar-value text-truncate" x-text="permissionLabel(activePermission())"></span>
          <button class="btn btn-sm btn-outline-secondary" @click="showPermissions = !showPermissions; reportClientStateSoon()"><i class="bi bi-shield-lock"></i></button>
        </div>
        <div class="list-group list-group-flush sidebar-list" x-show="showPermissions">
          <template x-for="profile in permissionProfiles()" :key="profile.Name || profile.name">
            <button class="list-group-item list-group-item-action" :class="{'active': permissionName(profile) === activePermission()}" @click="setPermission(permissionName(profile))">
              <div class="fw-semibold" x-text="profile.Label || profile.label || profile.Name || profile.name"></div>
              <div class="small opacity-75" x-text="profile.Description || profile.description || ''"></div>
            </button>
          </template>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-info-row">
          <span class="sidebar-label">Status</span>
          <span class="sidebar-value text-truncate" x-text="statusText()"></span>
        </div>
      </div>
      <div class="sidebar-section" x-show="execProcesses().length > 0" style="display: none;">
        <div class="sidebar-heading">Processes</div>
        <div class="exec-process-list">
          <template x-for="process in execProcesses()" :key="execProcessID(process)">
            <div class="exec-process-row">
              <i class="bi bi-terminal"></i>
              <span class="exec-process-command text-truncate" :title="execProcessTooltip(process)" x-text="execProcessCommand(process)"></span>
              <span class="badge exec-process-state" :class="execProcessClass(process)" x-text="execProcessLabel(process)"></span>
              <div class="exec-process-tooltip shadow">
                <div class="exec-process-tooltip-title" x-text="execProcessTooltip(process)"></div>
                <pre x-text="execProcessOutput(process)"></pre>
              </div>
            </div>
          </template>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-info-row">
          <span class="sidebar-heading">Chats</span>
          <button class="btn btn-sm btn-outline-primary" @click="newChat()"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="list-group list-group-flush sidebar-list">
          <template x-for="chat in state.chats || []" :key="chat.ID || chat.id">
            <div class="list-group-item list-group-item-action chat-list-item d-flex align-items-center gap-1" draggable="true" :class="{'active': chatID(chat) === state.active_chat_id, 'dragging': dragChatID === chatID(chat)}" @click="switchChat(chatID(chat))" @dragstart="startChatDrag($event, chatID(chat))" @dragover.prevent="overChatDrag($event, chatID(chat))" @drop.stop.prevent="dropChat($event, chatID(chat))" @dragend="endChatDrag()">
              <button type="button" class="btn btn-sm p-0 border-0 bg-transparent flex-grow-1 text-start chat-list-main" :class="{'text-white': chatID(chat) === state.active_chat_id}" @click.stop="switchChat(chatID(chat))">
                <div class="d-flex align-items-center gap-1 chat-list-content">
                  <i class="bi bi-grip-vertical chat-drag-handle" title="Drag to reorder"></i>
                  <i class="chat-status-icon bi" :class="[chatStatusIcon(chat), chatStatusClass(chat)]" :title="chatStatusLabel(chat)"></i>
                  <i class="bi bi-chat-left-text"></i>
                  <span class="text-truncate chat-title" x-text="chat.Title || chat.title || 'Chat'"></span>
                  <span class="chat-context text-nowrap" x-text="chatContextLabel(chat)" :title="chatContextTooltip(chat)"></span>
                </div>
              </button>
              <button type="button" class="btn btn-sm" :class="chatID(chat) === state.active_chat_id ? 'btn-outline-light' : 'btn-outline-danger'" title="Delete chat" @click.stop="deleteChat(chatID(chat))">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </template>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-heading">Approvals</div>
        <template x-for="approval in approvals()" :key="approval.ToolCallID || approval.tool_call_id">
          <div class="border rounded p-2 sidebar-card">
            <div class="small fw-semibold" x-text="approval.Tool || approval.tool"></div>
            <div class="small text-secondary" x-text="approval.Command || approval.command"></div>
            <div class="btn-group btn-group-sm mt-2">
              <button class="btn btn-success" @click="rpc('approve', {tool_call_id: approval.ToolCallID || approval.tool_call_id})"><i class="bi bi-check-lg"></i></button>
              <button class="btn btn-outline-danger" @click="rpc('deny', {tool_call_id: approval.ToolCallID || approval.tool_call_id})"><i class="bi bi-x-lg"></i></button>
            </div>
          </div>
        </template>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-heading">Milestones</div>
        <template x-if="milestoneSummary()">
          <div class="sidebar-note" x-text="milestoneSummary()"></div>
        </template>
        <template x-if="milestoneItems().length === 0">
          <div class="text-secondary">None</div>
        </template>
        <div class="planning-tree" x-show="milestoneItems().length > 0">
          <template x-for="milestone in milestoneItems()" :key="milestoneRef(milestone)">
            <div class="planning-node">
              <button type="button" class="planning-row" :title="milestoneNotes(milestone)" @click="toggleMilestone(milestoneRef(milestone))">
                <i class="bi planning-expander" :class="milestoneExpanded(milestoneRef(milestone)) ? 'bi-dash-square' : 'bi-plus-square'"></i>
                <i class="bi planning-status" :class="milestoneIcon(milestoneStatus(milestone))"></i>
                <span class="planning-title text-truncate" x-text="milestoneTitle(milestone)"></span>
                <span class="planning-ref" x-text="milestoneRef(milestone)"></span>
                <span class="planning-counts" x-text="milestoneTodoSummary(milestone)"></span>
                <span class="badge planning-badge" :class="milestoneBadge(milestoneStatus(milestone))" x-text="milestoneStatus(milestone)"></span>
              </button>
              <div class="planning-children" x-show="milestoneExpanded(milestoneRef(milestone))" x-transition>
                <template x-if="todoItemsForMilestone(milestone).length === 0">
                  <div class="planning-empty">No todos</div>
                </template>
                <template x-for="todo in todoItemsForMilestone(milestone)" :key="todo.ID || todo.id">
                  <div class="planning-todo">
                    <i class="bi" :class="todoIcon(todoStatus(todo))"></i>
                    <span class="text-truncate" x-text="todo.Content || todo.content"></span>
                    <span class="planning-todo-status" x-text="todoStatus(todo)"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-info-row git-summary-row">
          <span class="sidebar-heading">Git</span>
          <span class="fw-semibold text-truncate" x-show="gitStatus().available" x-text="gitStatus().branch || '-'"></span>
          <span class="small text-secondary text-truncate" x-show="gitStatus().available && gitStatus().upstream" x-text="gitStatus().upstream"></span>
          <span class="badge text-bg-secondary" x-show="gitStatus().available && gitStatus().summary" x-text="gitStatus().summary"></span>
          <span class="small text-nowrap ms-auto" x-show="gitStatus().available">
            <span class="diff-add" x-text="'+' + (gitStatus().added || 0)"></span>
            <span class="text-warning ms-1" x-text="'~' + (gitStatus().modified || 0)"></span>
            <span class="diff-del ms-1" x-text="'-' + (gitStatus().deleted || 0)"></span>
            <span class="text-info ms-1" x-text="'?' + (gitStatus().untracked || 0)"></span>
          </span>
          <button class="btn btn-sm btn-outline-secondary" title="Refresh git status" @click="refreshWorkspace()"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <template x-if="!gitStatus().available">
          <div class="text-secondary">No git repository</div>
        </template>
        <template x-if="gitStatus().available">
          <div class="sidebar-compact-block">
            <div class="list-group list-group-flush sidebar-list" x-show="gitFiles().length > 0">
              <template x-for="file in gitFiles()" :key="file.path || file.Path">
                <div class="list-group-item bg-transparent px-0 py-1 git-file" :class="gitFileClass(file)">
                  <div class="d-flex align-items-start justify-content-between gap-2">
                    <span class="text-break"><span class="badge me-1" :class="gitCodeBadge(file)" x-text="gitFileCode(file)"></span><span x-text="file.path || file.Path"></span></span>
                    <span class="small text-nowrap" x-show="gitAdditions(file) || gitDeletions(file)">
                      <span class="diff-add" x-text="'+' + gitAdditions(file)"></span>
                      <span class="diff-del ms-1" x-text="'-' + gitDeletions(file)"></span>
                    </span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </aside>

    <form class="composer p-3 bg-body" @submit.prevent="send()">
      <div class="composer-queue mb-2" x-show="activeQueue().length > 0" style="display: none;">
        <template x-for="item in activeQueue()" :key="queueItemID(item)">
          <div class="composer-queue-item" draggable="true" :class="{'dragging': dragQueueID === queueItemID(item)}" @dragstart="startQueueDrag($event, queueItemID(item))" @dragover.prevent="overQueueDrag($event, queueItemID(item))" @drop.stop.prevent="dropQueue($event, queueItemID(item))" @dragend="endQueueDrag()">
            <i class="bi bi-grip-vertical queue-drag-handle" title="Drag to reorder"></i>
            <span class="badge text-bg-secondary queue-kind" x-text="queueItemKind(item)"></span>
            <span class="queue-text text-truncate" :title="queueItemTooltip(item)" x-text="queueItemPreview(item)"></span>
            <span class="queue-attachments" x-show="queueAttachmentCount(item) > 0" x-text="'+' + queueAttachmentCount(item)"></span>
            <div class="btn-group btn-group-sm queue-actions">
              <button type="button" class="btn btn-outline-primary" title="Send now as steer" @click="sendQueueItemNow(item)"><i class="bi bi-send-fill"></i></button>
              <button type="button" class="btn btn-outline-secondary" title="Move to composer" @click="moveQueueItemToComposer(item)"><i class="bi bi-input-cursor-text"></i></button>
              <button type="button" class="btn btn-outline-danger" title="Remove from queue" @click="deleteQueueItem(item)"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        </template>
      </div>
      <div class="composer-menu list-group shadow-sm mb-2" x-show="completion.items.length > 0" style="display: none;">
        <template x-for="(item, idx) in completion.items" :key="item.insert_text + idx">
          <button type="button" class="list-group-item list-group-item-action d-flex align-items-start justify-content-between gap-3" :class="{'active': idx === completion.selected}" @mousedown.prevent="acceptCompletion(idx)">
            <span class="text-start">
              <span class="fw-semibold" x-text="item.label"></span>
              <span class="d-block small opacity-75" x-text="item.description || item.kind || ''"></span>
            </span>
            <span class="badge text-bg-secondary" x-text="completion.kind"></span>
          </button>
        </template>
      </div>
      <div class="composer-attachments mb-2" x-show="composerAttachments.length > 0" style="display: none;">
        <template x-for="attachment in composerAttachments" :key="attachment.id || attachment.ID">
          <span class="attachment-chip">
            <i class="bi" :class="attachmentIcon(attachment)"></i>
            <span class="text-truncate" x-text="attachmentName(attachment)"></span>
            <button type="button" class="btn btn-sm btn-link p-0 ms-1" title="Remove attachment" @click="removeComposerAttachment(attachment)"><i class="bi bi-x-lg"></i></button>
          </span>
        </template>
      </div>
      <div class="input-group">
        <button class="btn btn-danger interrupt-button" type="button" x-show="chatInterruptible()" :title="interruptButtonTitle()" @click="interruptChat()" style="display: none;">
          <i class="bi" :class="interruptArmed() ? 'bi-x-octagon-fill' : 'bi-stop-fill'"></i>
        </button>
        <textarea class="form-control composer-input" rows="1" x-ref="composerInput" x-model="draft" placeholder="Ask koder or type / for commands" @input="onComposerInput()" @click="updateCompletions()" @focus="reportClientStateSoon()" @blur="reportClientStateSoon()" @keyup="onComposerKeyup($event)" @keydown="onComposerKeydown($event)" @paste.prevent="onComposerPaste($event)"></textarea>
        <button class="btn btn-primary" type="submit"><i class="bi bi-send-fill"></i></button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop-lite" x-show="showModels" x-transition @keydown.escape.window="closeModelDialog()" style="display: none;">
    <section class="model-dialog bg-body border rounded shadow">
      <header class="d-flex align-items-center justify-content-between gap-3 p-3 border-bottom">
        <div>
          <div class="fw-semibold"><i class="bi bi-cpu me-1"></i> Select model</div>
          <div class="small text-secondary" x-text="activeProvider() + ' / ' + activeModel()"></div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" title="Refresh models" @click="refreshModelOptions()" :disabled="modelLoading"><i class="bi bi-arrow-clockwise"></i></button>
          <button type="button" class="btn btn-sm btn-outline-secondary" @click="closeModelDialog()"><i class="bi bi-x-lg"></i></button>
        </div>
      </header>
      <div class="p-3 border-bottom">
        <input class="form-control" type="search" x-model="modelQuery" placeholder="Filter models" x-ref="modelSearch">
      </div>
      <div class="model-list list-group list-group-flush">
        <template x-if="modelLoading">
          <div class="list-group-item text-secondary"><span class="spinner-border spinner-border-sm me-2"></span>Loading models</div>
        </template>
        <template x-if="!modelLoading && filteredModels().length === 0">
          <div class="list-group-item text-secondary">No models match the filter</div>
        </template>
        <template x-for="model in filteredModels()" :key="model.provider_id + '/' + model.model_id">
          <button type="button" class="list-group-item list-group-item-action d-flex align-items-start justify-content-between gap-3" :class="{'active': model.current}" @click="selectModel(model)">
            <span class="text-start">
              <span class="fw-semibold" x-text="model.model_id"></span>
              <span class="d-block small opacity-75">
                <span x-text="model.provider_label || model.provider_id"></span>
                <template x-if="model.owned_by"><span x-text="' · ' + model.owned_by"></span></template>
              </span>
            </span>
            <i class="bi bi-check-lg" x-show="model.current"></i>
          </button>
        </template>
      </div>
    </section>
  </div>

  <div class="modal-backdrop-lite" x-show="showSessions" x-transition @keydown.escape.window="closeSessionDialog()" style="display: none;">
    <section class="session-dialog bg-body border rounded shadow">
      <header class="d-flex align-items-center justify-content-between gap-3 p-3 border-bottom">
        <div>
          <div class="fw-semibold"><i class="bi bi-collection me-1"></i> Sessions</div>
          <div class="small text-secondary" x-text="sessionState.workdir || state.workdir || ''"></div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" @click="closeSessionDialog()"><i class="bi bi-x-lg"></i></button>
      </header>
      <div class="p-3 border-bottom">
        <button class="btn btn-primary" type="button" @click="beginCreateSession()"><i class="bi bi-plus-lg"></i> New Session</button>
      </div>
      <div class="session-list list-group list-group-flush">
        <template x-if="sessionLoading">
          <div class="list-group-item text-secondary"><span class="spinner-border spinner-border-sm me-2"></span>Loading sessions</div>
        </template>
        <template x-if="!sessionLoading && sessionRows().length === 0">
          <div class="list-group-item text-secondary">No sessions in this workspace</div>
        </template>
        <template x-for="session in sessionRows()" :key="sessionID(session)">
          <div class="list-group-item list-group-item-action d-flex align-items-start justify-content-between gap-3" :class="{'active': sessionID(session) === activeSessionID()}">
            <button type="button" class="btn btn-link text-start p-0 flex-grow-1 text-decoration-none" :class="sessionID(session) === activeSessionID() ? 'text-white' : 'text-body'" @click="switchSession(sessionID(session))">
              <span>
                <span class="fw-semibold" x-text="sessionTitle(session)"></span>
                <span class="d-block small opacity-75 text-truncate" x-text="sessionProjectRoot(session)"></span>
                <span class="d-block small opacity-75">
                  <template x-if="session.LastMessage || session.last_message"><span x-text="session.LastMessage || session.last_message"></span></template>
                </span>
              </span>
            </button>
            <div class="btn-group btn-group-sm">
              <button type="button" class="btn" :class="sessionID(session) === activeSessionID() ? 'btn-outline-light' : 'btn-outline-secondary'" title="Edit session" @click.stop="beginEditSession(session)"><i class="bi bi-pencil"></i></button>
              <button type="button" class="btn" :class="sessionID(session) === activeSessionID() ? 'btn-outline-light' : 'btn-outline-danger'" title="Delete session" @click.stop="deleteSession(sessionID(session))"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        </template>
      </div>
    </section>
  </div>

  <div class="modal-backdrop-lite" x-show="showSessionEditor" x-transition @keydown.escape.window="closeSessionEditor()" style="display: none;">
    <section class="bg-body border rounded shadow" style="width: min(560px, 100%);">

        <div>
          <div class="fw-semibold"><i class="bi bi-hdd-network me-1"></i> MCP server</div>
          <div class="small text-secondary" x-text="mcpDraft?.id || 'New MCP server'"></div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" @click="closeMCPEditor()"><i class="bi bi-x-lg"></i></button>
      </header>
      <form class="settings-item-form p-3" @submit.prevent="saveMCPServer()">
        <template x-if="mcpDraft">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small text-secondary">Server ID</label>
              <input class="form-control" x-model="mcpDraft.id" autocomplete="off">
            </div>
            <div class="col-md-6">
              <label class="form-label small text-secondary">Name</label>
              <input class="form-control" x-model="mcpDraft.name" autocomplete="off">
            </div>
            <div class="col-12">
              <label class="form-label small text-secondary">URL</label>
              <input class="form-control" x-model="mcpDraft.url" autocomplete="off">
            </div>
            <div class="col-md-6">
              <label class="form-label small text-secondary">Startup timeout</label>
              <input class="form-control" x-model="mcpDraft.startup_timeout" placeholder="10s" autocomplete="off">
            </div>
            <div class="col-md-6">
              <label class="form-label small text-secondary">Request timeout</label>
              <input class="form-control" x-model="mcpDraft.request_timeout" placeholder="30s" autocomplete="off">
            </div>
            <div class="col-md-6">
              <label class="form-label small text-secondary">Bearer token</label>
              <input class="form-control" type="password" x-model="mcpDraft.bearer_token" autocomplete="off">
            </div>
            <div class="col-md-6">
              <label class="form-label small text-secondary">Bearer token env</label>
              <input class="form-control" x-model="mcpDraft.bearer_token_env" autocomplete="off">
            </div>
            <div class="col-12 settings-checks">
              <label class="form-check"><input class="form-check-input" type="checkbox" x-model="mcpDraft.disabled"> <span class="form-check-label">Disabled</span></label>
              <label class="form-check"><input class="form-check-input" type="checkbox" x-model="mcpDraft.disable_standalone_sse"> <span class="form-check-label">Disable standalone SSE</span></label>
            </div>
            <div class="col-12">
              <label class="form-label small text-secondary">Headers JSON</label>
              <textarea class="form-control font-monospace" rows="4" x-model="mcpHeadersText" spellcheck="false"></textarea>
            </div>
            <div class="col-12" x-show="mcpStatus">
              <div class="alert mb-0" :class="mcpStatusKind === 'success' ? 'alert-success' : (mcpStatusKind === 'danger' ? 'alert-danger' : 'alert-secondary')" x-text="mcpStatus"></div>
            </div>
          </div>
        </template>
        <footer class="d-flex justify-content-end gap-2 mt-3 pt-3 border-top">
          <button type="submit" class="btn btn-primary" :disabled="!mcpDraft">Save</button>
          <button type="button" class="btn btn-outline-secondary" @click="closeMCPEditor()">Cancel</button>
        </footer>
      </form>
    </section>
  </div>

  <div class="toast-stack" x-show="toast" x-transition style="display: none;">
    <div class="alert alert-danger shadow mb-0" role="status" x-text="toast"></div>
  </div>

  <div class="modal-backdrop-lite image-lightbox" x-show="imageLightbox.open" x-transition @click.self="closeImageLightbox()" @keydown.escape.window="closeImageLightbox()" style="display: none;">
    <section class="image-lightbox-dialog border rounded shadow">
      <header class="d-flex align-items-center justify-content-between gap-3 p-2 border-bottom">
        <div class="min-w-0">
          <div class="fw-semibold text-truncate" x-text="imageLightbox.title || 'Image preview'"></div>
          <div class="small text-secondary text-truncate" x-show="imageLightbox.meta" x-text="imageLightbox.meta"></div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" @click="closeImageLightbox()" title="Close image preview"><i class="bi bi-x-lg"></i></button>
      </header>
      <div class="image-lightbox-body">
        <img class="image-lightbox-img" :src="imageLightbox.src" :alt="imageLightbox.title || 'Image preview'">
      </div>
    </section>
  </div>
</body>
</html>
